name: Website E2E Tests

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'website/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'website/**'
      - '.github/workflows/e2e-tests.yml'

jobs:
  test:
    name: Run E2E Automation Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: website/package-lock.json

    - name: Install Dependencies
      run: |
        cd website
        npm ci

    - name: Start Website Server
      run: |
        cd website
        node serve.js &
        # Wait for server to boot up on port 8080
        for i in {1..10}; do
          curl -s http://localhost:8080 && break
          echo "Waiting for server to start..."
          sleep 1
        done

    - name: Run E2E Tests
      env:
        HEADLESS: "true"
        CI: "true"
      run: |
        cd website
        npm run test-e2e

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: campusstay-test-reports
        path: website/test/reports/
