name: Flutter App CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/app-tests.yml'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/app-tests.yml'

jobs:
  test:
    name: Run Flutter Analyzer and Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Install Dependencies
      run: |
        cd flutter_app
        flutter pub get

    - name: Run Linter (flutter analyze)
      run: |
        cd flutter_app
        flutter analyze

    - name: Run Tests
      run: |
        cd flutter_app
        flutter test
