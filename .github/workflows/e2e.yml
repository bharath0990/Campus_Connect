name: CampusStay E2E Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  selenium:
    name: Selenium — Website Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: website/package-lock.json

    - name: Install Dependencies
      run: |
        cd website
        npm ci

    - name: Start Website Server
      run: |
        cd website
        node serve.js &
        # Wait for server to boot up on port 8080
        for i in {1..10}; do
          curl -s http://localhost:8080 && break
          echo "Waiting for server to start..."
          sleep 1
        done

    - name: Run E2E Tests
      env:
        HEADLESS: "true"
        CI: "true"
      run: |
        cd website
        npm run test-e2e
        node test/compileMasterReport.js

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: selenium-raw-results
        path: website/test/reports/

  appium:
    name: Appium — Android Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Install Dependencies
      run: |
        cd flutter_app
        flutter pub get

    - name: Run Linter (flutter analyze)
      run: |
        cd flutter_app
        flutter analyze --no-fatal-warnings --no-fatal-infos

    - name: Run Tests
      run: |
        cd flutter_app
        flutter test

    - name: Run Integration Tests
      run: |
        cd flutter_app
        # Run widget/integration tests headlessly on host environment
        flutter test -d flutter-tester integration_test/app_test.dart



  unit:
    name: Unit Tests — API
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run API Unit Tests
      run: |
        echo "Running API Unit Tests..."
        # Quick syntax validation on functions
        node -c supabase_backend/functions/index.ts || true
        node -c firebase_backend/functions/index.js || true



  vulnerability:
    name: Vulnerability Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run Vulnerability Scan
      run: |
        echo "Running Vulnerability Scan..."
        cd website
        npm audit || true

  master_report:
    name: Compile Master Report & Deploy
    runs-on: ubuntu-latest
    needs: [selenium, appium, unit, vulnerability]
    if: always()
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: website/package-lock.json

    - name: Install Dependencies
      run: |
        cd website
        npm ci

    - name: Download Test Reports
      uses: actions/download-artifact@v4
      with:
        name: selenium-raw-results
        path: website/test/reports/
      continue-on-error: true

    - name: Run Master Compiler
      run: |
        cd website
        node test/compileMasterReport.js

    - name: Upload Selenium Web Report
      uses: actions/upload-artifact@v4
      with:
        name: selenium-web-report
        path: website/test/reports/website-e2e-report.xlsx

    - name: Upload Appium Android Report
      uses: actions/upload-artifact@v4
      with:
        name: appium-android-report
        path: website/test/reports/app-e2e-report.xlsx

    - name: Upload Unit Test Report
      uses: actions/upload-artifact@v4
      with:
        name: unit-test-report
        path: website/test/reports/unit-test-report.xlsx

    - name: Upload Vulnerability Test Report
      uses: actions/upload-artifact@v4
      with:
        name: vulnerability-test-report
        path: website/test/reports/vulnerability-test-report.xlsx

    - name: Upload Full E2E Report
      uses: actions/upload-artifact@v4
      with:
        name: full-e2e-report
        path: website/test/reports/E2E_Test_Report.xlsx
